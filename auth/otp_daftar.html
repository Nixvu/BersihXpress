<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- (Komentar) Meta tag viewport, penting untuk WebView -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi OTP - BersihXpress</title>
    
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/webview.css">
    <script src="../assets/js/webview.js"></script>
    <script src="../assets/js/tailwind.js"></script>
</head>
<body class="bg-white">
    <div id="loading-overlay" class="loading-container">
        <img src="../assets/images/loading.gif" alt="Memuat..." class="loading-indicator">
    </div>
    <!-- (Komentar) Kontainer utama halaman -->
    <div class="relative min-h-screen">

        <!-- ====================================================== -->
        <!-- (Komentar) 1. Bagian Header Biru (dengan Ilustrasi)    -->
        <!-- ====================================================== -->
        <div class="relative bg-blue-600 h-80 w-full rounded-b-[40px] flex flex-col items-center justify-center text-white p-6 overflow-hidden">
            
            <!-- (Komentar) Tombol Kembali (pojok kiri atas) -->
            <a href="daftar.html" class="absolute top-6 left-6 z-10 text-white p-2">
                <svg data-feather="chevron-left" class="w-7 h-7"></svg>
            </a>
            
            <!-- (Komentar) Elemen dekoratif lingkaran (opsional) -->
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-white/10 rounded-full z-0 opacity-50"></div>
            <div class="absolute top-5 right-20 w-8 h-8 bg-white/10 rounded-full z-0 opacity-50"></div>
            <div class="absolute bottom-5 -right-5 w-16 h-16 bg-white/10 rounded-full z-0 opacity-50"></div>

            <!-- (Komentar) Placeholder untuk Ilustrasi OTP -->
            <!-- Ganti 'src' ini dengan path ke file ilustrasi Anda -->
            <div class="z-10">
                <img src="../assets/images/illustrations/OTP.svg" alt="Ilustrasi Konfirmasi OTP" class="w-auto h-48">
            </div>
            
        </div>

        <!-- ====================================================== -->
        <!-- (Komentar) 2. Konten Form OTP                          -->
        <!-- ====================================================== -->
        <div class="p-6 mt-8">

            <!-- (Komentar) Judul Halaman -->
            <h1 class="text-3xl font-bold text-gray-900">Konfirmasi OTP</h1>
            <p class="text-gray-500 mt-2 mb-6">Kami telah mengirim kode OTP ke email anda</p>

            <!-- (Komentar) Form OTP -->
            <!-- (Komentar) Aksi form bisa di-handle oleh JavaScript -->
            <form id="otp-form" action="#">
                
                <!-- (Komentar) Kontainer untuk 4 kotak input OTP -->
                <!-- 'justify-between' memberi jarak yang sama antar kotak -->
                <div class="flex justify-between space-x-2 sm:space-x-4 max-w-xs mx-auto mb-6">
                    <input type="tel" maxlength="1" class="otp-input" data-index="0" required>
                    <input type="tel" maxlength="1" class="otp-input" data-index="1" required>
                    <input type="tel" maxlength="1" class="otp-input" data-index="2" required>
                    <input type="tel" maxlength="1" class="otp-input" data-index="3" required>
                </div>

                <!-- (Komentar) Tombol Konfirmasi (Primary) -->
                <button type="submit"
                    class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition duration-300 mt-4">
                    Konfirmasi OTP
                </button>
                
            </form>

            <!-- (Komentar) Link Kirim Ulang Kode -->
            <div class="text-center mt-8">
                <span class="text-sm text-gray-500">Belum menerima kode? </span>
                <a href="#" class="text-sm font-semibold text-blue-600 hover:underline">
                    Klik Disini
                </a>
            </div>

        </div>
    </div>

    <script src="../assets/js/icons.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth-otp.js"></script>

</body>
</html>
