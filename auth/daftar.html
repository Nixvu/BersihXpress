<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- (Komentar) Meta tag viewport ini SANGAT PENTING untuk Android WebView -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - BersihXpress</title>
    
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/webview.css">
    <script src="../assets/js/webview.js"></script>
    <script src="../assets/js/tailwind.js"></script>
</head>
<body class="bg-gray-100">
    <div id="loading-overlay" class="loading-container">
        <img src="../assets/images/loading.gif" alt="Memuat..." class="loading-indicator">
    </div>
    <!-- (Komentar) Kontainer utama halaman -->
    <div class="relative min-h-screen">

        <!-- ====================================================== -->
        <!-- (Komentar) 1. Bagian Header Biru (latar belakang logo)  -->
        <!-- Bagian ini 100% konsisten dengan halaman Masuk         -->
        <!-- ====================================================== -->
        <div class="relative bg-blue-600 h-64 w-full rounded-b-[40px] flex flex-col items-center justify-center text-white p-6 overflow-hidden">
            
            <!-- (Komentar) Elemen dekoratif lingkaran (opsional) -->
            <div class="absolute top-10 left-10 w-16 h-16 bg-white/10 rounded-full z-0 opacity-50"></div>
            <div class="absolute top-5 right-20 w-8 h-8 bg-white/10 rounded-full z-0 opacity-50"></div>
            <div class="absolute top-24 right-5 w-12 h-12 bg-white/10 rounded-full z-0 opacity-50"></div>

            <!-- (Komentar) LOGO ANDA -->
            <!-- Ganti 'URL_LOGO_ANDA.png' dengan path ke file logo Anda. -->
            <img src="../assets/images/illustrations/Logo.svg" alt="Logo BersihXpress" class="w-auto h-16 z-10">
            
        </div>

        <!-- ====================================================== -->
        <!-- (Komentar) 2. Kartu Pendaftaran Putih (Form)           -->
        <!-- ====================================================== -->
        <!-- (Komentar) Menggunakan margin negatif agar tumpang tindih dengan header biru -->
        <div class="relative bg-white p-6 rounded-2xl shadow-lg mx-4 mt-[-80px] z-10">

            <!-- (Komentar) Judul Halaman -->
            <h1 class="text-3xl font-bold text-gray-900 text-center">Daftar</h1>
            <p class="text-gray-500 text-center mt-2 mb-6">Silahkan daftar untuk melanjutkan</p>

            <!-- (Komentar) Form Pendaftaran -->
            <form action="#" method="POST">
                <!-- (Komentar) Kontainer untuk semua input, diberi jarak 'space-y-4' -->
                <div class="space-y-4">
                    
                    <!-- (Komentar) Input: Nama Pengguna -->
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                            Nama Pengguna
                        </label>
                        <div class="relative">
                            <!-- (Komentar) Ikon User (dari Feather Icons) -->
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg data-feather="user" class="h-5 w-5 text-gray-400"></svg>
                            </span>
                            <!-- (Komentar) Input field -->
                            <input type="text" id="username" name="username"
                                class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="Nama Pengguna">
                        </div>
                    </div>

                    <!-- (Komentar) Input: Alamat Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                            Alamat Email
                        </label>
                        <div class="relative">
                            <!-- (Komentar) Ikon Email -->
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg data-feather="mail" class="h-5 w-5 text-gray-400"></svg>
                            </span>
                            <input type="email" id="email" name="email"
                                class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="Alamat Email">
                        </div>
                    </div>

                    <!-- (Komentar) Input: No Handphone -->
                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">
                            No Handphone
                        </label>
                        <div class="relative">
                            <!-- (Komentar) Ikon Telepon -->
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg data-feather="phone" class="h-5 w-5 text-gray-400"></svg>
                            </span>
                            <input type="tel" id="phone" name="phone"
                                class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="No Handphone">
                        </div>
                    </div>

                    <!-- (Komentar) Input: Kata Sandi -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                            Kata Sandi
                        </label>
                        <div class="relative">
                            <!-- (Komentar) Ikon Gembok -->
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg data-feather="lock" class="h-5 w-5 text-gray-400"></svg>
                            </span>
                            <input type="password" id="password" name="password"
                                class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="Kata Sandi">
                        </div>
                    </div>

                    <!-- (Komentar) Tombol Daftar (Primary) -->
                    <!-- Tidak ada tombol secondary di halaman ini -->
                    <button type="submit"
                        class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition duration-300 mt-2">
                        Daftar Akun
                    </button>

                </div>
            </form>

            <!-- (Komentar) Link Pindah ke Halaman Masuk -->
            <div class="text-center mt-6">
                <span class="text-sm text-gray-500">sudah punya akun? </span>
                <a href="masuk.html" class="text-sm font-semibold text-blue-600 hover:underline">
                    Klik Disini
                </a>
            </div>

        </div>

        <!-- ====================================================== -->
        <!-- (Komentar) 3. Versi Footer (Konsisten)                -->
        <!-- ====================================================== -->
        <div class="text-center text-xs text-gray-400 py-6">
            Ver 1.0
        </div>
    </div>

    <script src="../assets/js/icons.js"></script>
    <script src="../assets/js/main.js"></script>

</body>
</html>
