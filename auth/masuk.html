<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag viewport ini SANGAT PENTING untuk Android WebView -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - BersihXpress</title>
    
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/webview.css">
    <script src="../assets/js/webview.js"></script>
    <script src="../assets/js/tailwind.js"></script>
</head>
<body class="bg-gray-100">
    <div id="loading-overlay" class="loading-container">
        <img src="../assets/images/loading.gif" alt="Memuat..." class="loading-indicator">
    </div>
    <!-- Kontainer utama -->
    <div class="relative min-h-screen">

        <!-- 1. Bagian Header Biru (latar belakang logo) -->
        <div class="relative bg-blue-600 h-64 w-full rounded-b-[40px] flex flex-col items-center justify-center text-white p-6 overflow-hidden">
            
            <!-- Elemen dekoratif lingkaran (seperti di desain) -->
            <div class="absolute top-10 left-10 w-16 h-16 bg-white/10 rounded-full z-0 opacity-50"></div>
            <div class="absolute top-5 right-20 w-8 h-8 bg-white/10 rounded-full z-0 opacity-50"></div>
            <div class="absolute top-24 right-5 w-12 h-12 bg-white/10 rounded-full z-0 opacity-50"></div>

            <!-- 
                LOGO ANDA:
                Ganti 'URL_LOGO_ANDA.png' dengan path ke file logo Anda.
                Saya menggunakan placeholder yang mirip dengan desain.
            -->
            <img src="../assets/images/illustrations/Logo.svg" alt="Logo BersihXpress" class="w-auto h-16 z-10">
            
        </div>

        <!-- 2. Kartu Login Putih -->
        <!-- Menggunakan margin negatif untuk tumpang tindih dengan header biru -->
        <div class="relative bg-white p-6 rounded-2xl shadow-lg mx-4 mt-[-80px] z-10">

            <h1 class="text-3xl font-bold text-gray-900 text-center">Masuk</h1>
            <p class="text-gray-500 text-center mt-2 mb-6">Silahkan masuk untuk melanjutkan</p>

            <form id="login-form" action="/auth/login.php" method="POST">
                <div class="space-y-4">
                    
                    <!-- Input Alamat Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                            Alamat Email
                        </label>
                        <div class="relative">
                            <!-- Ikon Email -->
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg data-feather="mail" class="h-5 w-5 text-gray-400"></svg>
                            </span>
                            <input type="email" id="email" name="email" autocomplete="username" required
                                class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="Alamat Email">
                        </div>
                    </div>

                    <!-- Input Kata Sandi -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                            Kata Sandi
                        </label>
                        <div class="relative">
                            <!-- Ikon Gembok -->
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg data-feather="lock" class="h-5 w-5 text-gray-400"></svg>
                            </span>
                            <input type="password" id="password" name="password" autocomplete="current-password" required
                                class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="Kata Sandi">
                        </div>
                    </div>

                    <!-- Tombol Masuk (Primary) -->
                    <button type="submit"
                        class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition duration-300 mt-2">
                        Masuk
                    </button>

                    <!-- Tombol Daftar Akun (Secondary) -->
                    <button type="button" onclick="location.href='daftar.html'"
                        class="w-full bg-white text-blue-600 border border-blue-600 font-bold py-3 px-4 rounded-lg hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition duration-300">
                        Daftar Akun
                    </button>
                </div>
            </form>

            <!-- Link Lupa Kata Sandi -->
            <div class="text-center mt-6">
                <span class="text-sm text-gray-500">Lupa kata sandi? </span>
                <a href="email.html" class="text-sm font-semibold text-blue-600 hover:underline">
                    Klik Disini
                </a>
            </div>

        </div>

        <!-- 3. Versi Footer -->
        <div class="text-center text-xs text-gray-400 py-6">
            Ver 1.0
        </div>
    </div>

    <script src="../assets/js/icons.js"></script>
    <script src="../assets/js/main.js"></script>

</body>
</html>
